<!DOCTYPE html>
<html>
<head>
  <title>Meu primeiro Three.js</title>
  <style>
    body { margin: 0; } /* deixa o site sem bordas da web*/
  </style>
</head>
<body>
  <script type="module">
    /*biblioteca do three js*/
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js'; 

    // 1. Cena
    const scene = new THREE.Scene();

    // 2. Câmera
    const camera = new THREE.PerspectiveCamera(
      100, window.innerWidth / window.innerHeight, 0.1, 1000
    );

    // 3. Renderizador
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 4. Criar um cubo
    const geometry = new THREE.BoxGeometry(); // forma
    const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
    const cube = new THREE.Mesh(geometry, material); //forma + cor
    /*const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(1, 5, 2);
    scene.add(light);*/
    //cube.position.x = 2;
    
/*    const geometry2 = new THREE.PlaneGeometry();
    const material2 = new THREE.MeshBasicMaterial({color: 0x00ff00 });
    const esfera = new THREE.Mesh(geometry2, material2);
*/
    scene.add(cube);
    cube.scale.set(2, 1, 3);
    //scene.add(esfera);

    camera.position.z = 5;

    // 5. Loop de animação
    function animate() {
      requestAnimationFrame(animate); //cria um loop

      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
