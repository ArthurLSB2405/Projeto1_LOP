<!DOCTYPE html>
<html>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

const scene = new THREE.Scene(); // o mundo
scene.background = new THREE.Color(0x169EC7);

const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CUBO
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshBasicMaterial({ color: 0x00008B }); // o material standard precisa de luz, o basic não

const cube = new THREE.Mesh(geometry, material);
cube.scale.set(2, 1, 2.5);

const geometry1 = new THREE.BoxGeometry();
const material1 = new THREE.MeshBasicMaterial({ color: 0x00008B });
const cube1 = new THREE.Mesh(geometry1, material1);
cube1.position.y = 0.75;
cube1.scale.set(2, 0.75, 0.5);

const forma_pneu = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 128);
const mat_pneu = new THREE.MeshBasicMaterial({ color: 0x696969 });
const pneu1 = new THREE.Mesh(forma_pneu, mat_pneu);
const pneu2 = new THREE.Mesh(forma_pneu, mat_pneu);
const pneu3 = new THREE.Mesh(forma_pneu, mat_pneu);
const pneu4 = new THREE.Mesh(forma_pneu, mat_pneu);



var pos_y = -0.5;
//pneus
pneu1.position.y = pos_y;
pneu1.position.x = -0.9;
pneu1.position.z = -0.65;
pneu1.rotation.x = Math.PI / 2;
pneu1.rotation.z = Math.PI / 2;

pneu2.position.y = pos_y;
pneu2.position.x = 0.9;
pneu2.position.z = -0.65;
pneu2.rotation.x = Math.PI / 2;
pneu2.rotation.z = Math.PI / 2;

pneu3.position.y = pos_y;
pneu3.position.x = -0.9;
pneu3.position.z = 0.65;
pneu3.rotation.x = Math.PI / 2;
pneu3.rotation.z = Math.PI / 2;

pneu4.position.y = pos_y;
pneu4.position.x = 0.9;
pneu4.position.z = 0.65;
pneu4.rotation.x = Math.PI / 2;
pneu4.rotation.z = Math.PI / 2;

const carro = new THREE.Group();
carro.add(cube); //adicionando o cubo para o grupo
carro.add(cube1);
carro.add(pneu1);
carro.add(pneu2);
carro.add(pneu3);
carro.add(pneu4);
scene.add(carro);

//Chão
const form_terra = new THREE.PlaneGeometry(500, 500);
const mat_terra = new THREE.MeshBasicMaterial({color: 0x228B22});
const terra = new THREE.Mesh(form_terra, mat_terra);
terra.rotation.x = -Math.PI/2;
terra.position.y = pos_y - 0.4;

const estrada = new THREE.Group();

const form_pista = new THREE.PlaneGeometry(12, 500);
const mat_pista = new THREE.MeshBasicMaterial({color: 0x000000});
const pista = new THREE.Mesh(form_pista, mat_pista);
pista.rotation.x = -Math.PI/2;
pista.position.y = pos_y - 0.36;


const form_faixa = new THREE.PlaneGeometry(0.5, 2);
const mat_faixa = new THREE.MeshBasicMaterial({color: 0xFFFFFF});
for (let i = -250; i < 249; i += 5) {
  const faixa = new THREE.Mesh(form_faixa, mat_faixa);

  faixa.rotation.x = -Math.PI / 2;
  faixa.position.y = pos_y - 0.35;
  faixa.position.z = i;

  estrada.add(faixa);
}



estrada.add(pista)
scene.add(estrada);
scene.add(terra);
// câmera
camera.position.z = 5;
camera.position.y = 4;
camera.rotation.x = -(Math.PI/6);

//Organização e confecção dos movimentos
const keys = {};

document.addEventListener("keydown", (event) => {
  keys[event.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (event) => {
  keys[event.key.toLowerCase()] = false;
});


const speed = 0.5;
const offset = new THREE.Vector3(0, 4, 8);
function animate() {
  requestAnimationFrame(animate);

  if (keys["w"]) carro.position.z -= speed;
  if (keys["s"]) carro.position.z += speed;
  if (keys["a"]) carro.position.x -= speed;
  if (keys["d"]) carro.position.x += speed;
  const cameraPosition = offset.clone().add(carro.position);

  camera.position.copy(cameraPosition);

  camera.lookAt(carro.position);

  renderer.render(scene, camera);
}




animate();
</script>
</body>
</html>
